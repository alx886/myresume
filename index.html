<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel Orellana | Technical Solutions Consultant & Full-Stack Innovator</title>
    <meta name="description" content="Professional web portfolio of Manuel Orellana, an award-winning Technical Solutions Consultant with 25 years of expertise in enterprise workflows, document systems, and full-stack web applications.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://alx886.github.io/myresume/">

    <style>
        :root {
            --text-primary: #0f172a;      
            --text-secondary: #334155;    
            --accent-corporate: #1d4ed8; 
            --accent-pdf: #ee3124;       
            --border-slate: #cbd5e1;     
            --tag-bg: #e2e8f0;           
            --card-bg: rgba(241, 245, 249, 0.8); 
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { color: var(--text-primary); font-family: var(--font-stack); line-height: 1.6; background-color: #e2e8f0; padding: 0; min-height: 100vh; }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        
        /* Header & Contact Area */
        header { display: grid; grid-template-columns: 180px 1fr; gap: 2rem; align-items: start; padding-bottom: 3rem; border-bottom: 1px solid var(--border-slate); margin-bottom: 3rem; }
        .profile-img { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-slate); }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.25rem; }
        h1 span { color: var(--accent-corporate); font-weight: 400; }
        .tagline { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 1.25rem; font-weight: 600; }

        .contact-layout-wrapper { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
        .contact-info { display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); }
        .contact-info a { color: var(--text-primary); font-weight: 700; text-decoration: none; }

        /* Language Switcher Styling */
        .lang-switch-container { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
        .lang-btn { background: none; border: 1px solid var(--border-slate); cursor: pointer; display: flex; align-items: center; gap: 0.4rem; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700; transition: all 0.2s; }
        .lang-btn.active { background-color: var(--text-primary); color: #fff; border-color: var(--text-primary); }
        .flag-icon { width: 16px; height: 12px; object-fit: cover; }
        
        .pdf-download-btn { background-color: var(--accent-pdf); color: #fff; padding: 0.6rem 1rem; border-radius: 6px; text-decoration: none; font-weight: 700; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="https://i.ibb.co/hxCX8r30/Profile-Picture-2.png" alt="Manuel Orellana" class="profile-img">
            <div class="header-text">
                <h1>MANUEL <span>ORELLANA</span></h1>
                <div class="tagline" data-en="Technical Solutions Consultant & Full-Stack Systems Innovator" data-es="Consultor de Soluciones Técnicas e Innovador Full-Stack">
                    Technical Solutions Consultant & Full-Stack Systems Innovator
                </div>

                <div class="contact-layout-wrapper">
                    <div class="contact-info">
                        <span>📍 Toronto, ON</span>
                        <span>📞 <a href="tel:+16472410612">(647) 241-0612</a></span>
                        <span>✉️ <a href="mailto:alx886@gmail.com">alx886@gmail.com</a></span>
                        
                        <div class="lang-switch-container">
                            <button class="lang-btn active" id="btn-lang-en" onclick="setGlobalAppLanguage('en')">
                                <img src="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.4.6/flags/4x3/gb.svg" class="flag-icon"> EN
                            </button>
                            <button class="lang-btn" id="btn-lang-es" onclick="setGlobalAppLanguage('es')">
                                <img src="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.4.6/flags/4x3/es.svg" class="flag-icon"> ES
                            </button>
                        </div>
                    </div>
                    
                    <a href="#" class="pdf-download-btn" data-en="Download Resume" data-es="Descargar CV">Download Resume</a>
                </div>
            </div>
        </header>

        <main id="main-content">
            <section>
                <h2 data-en="Professional Summary" data-es="Resumen Profesional">Professional Summary</h2>
                <p data-en="Innovative Technology Specialist with 25 years of experience..." data-es="Especialista tecnológico innovador con 25 años de experiencia...">
                    Innovative Technology Specialist with 25 years of experience...
                </p>
            </section>
        </main>
    </div>

    <script>
        function setGlobalAppLanguage(lang) {
            // Update button states
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-lang-${lang}`).classList.add('active');

            // Translate all elements with data attributes
            document.querySelectorAll('[data-en][data-es]').forEach(el => {
                el.innerHTML = el.getAttribute(`data-${lang}`);
            });
        }
    </script>
</body>
</html>
